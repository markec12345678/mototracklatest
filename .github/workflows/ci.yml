name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel in-progress runs for the same ref when a new commit is pushed
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ──────────────────────────────────────────────────────────────
  # Lint — fast feedback on ESLint errors
  # ──────────────────────────────────────────────────────────────
  lint:
    name: Lint (ESLint)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: ⬇️ Checkout
        uses: actions/checkout@v4

      - name: 🅱️ Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: 📦 Install dependencies
        run: bun install --frozen-lockfile

      - name: 🧹 Run ESLint
        run: bun run lint

  # ──────────────────────────────────────────────────────────────
  # Typecheck — TypeScript strict mode, no emit
  # ──────────────────────────────────────────────────────────────
  typecheck:
    name: Typecheck (tsc --noEmit)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: ⬇️ Checkout
        uses: actions/checkout@v4

      - name: 🅱️ Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: 📦 Install dependencies
        run: bun install --frozen-lockfile

      - name: 🔍 Generate Prisma client
        run: bun run db:generate

      - name: 🔎 Run TypeScript compiler
        run: bunx tsc --noEmit

  # ──────────────────────────────────────────────────────────────
  # Build — full Next.js production build
  # Only runs on PRs to avoid double-running on push + PR
  # ──────────────────────────────────────────────────────────────
  build:
    name: Build (Next.js)
    runs-on: ubuntu-latest
    timeout-minutes: 25
    needs: [lint, typecheck]
    # Run on PRs always; on push only if to main (for deployment confidence)
    if: github.event_name == 'pull_request' || (github.event_name == 'push' && github.ref == 'refs/heads/main')
    env:
      NEXT_PUBLIC_MAPTILER_KEY: ci-placeholder-key-not-real
      DATABASE_URL: file:./db/ci.db
      NEXT_TELEMETRY_DISABLED: '1'
    steps:
      - name: ⬇️ Checkout
        uses: actions/checkout@v4

      - name: 🅱️ Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: 📦 Install dependencies
        run: bun install --frozen-lockfile

      - name: 🔍 Generate Prisma client
        run: bun run db:generate

      - name: 🗄️ Push database schema
        run: bun run db:push

      - name: 🏗️ Build Next.js app
        run: bun run build
        env:
          NODE_OPTIONS: --max-old-space-size=4096

  # ──────────────────────────────────────────────────────────────
  # Summary — single status gate for branch protection
  # ──────────────────────────────────────────────────────────────
  ci-pass:
    name: CI Passed
    runs-on: ubuntu-latest
    needs: [lint, typecheck, build]
    if: always()
    steps:
      - name: ✅ All checks passed
        if: ${{ !(contains(needs.*.result, 'failure')) }}
        run: echo "🎉 All CI jobs passed."
      - name: ❌ Some checks failed
        if: ${{ contains(needs.*.result, 'failure') }}
        run: |
          echo "❌ CI failed. See job logs for details."
          exit 1
